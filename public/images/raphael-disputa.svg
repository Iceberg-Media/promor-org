<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <radialGradient id="sky" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#2a1f10"/>
      <stop offset="100%" stop-color="#0d0905"/>
    </radialGradient>
    <linearGradient id="arch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d2e14"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#sky)"/>

  <!-- Architectural arch -->
  <path d="M80,480 L80,180 Q400,40 720,180 L720,480 Z" fill="none" stroke="#8a6830" stroke-width="3" opacity="0.6"/>
  <path d="M120,480 L120,200 Q400,70 680,200 L680,480 Z" fill="none" stroke="#6a5020" stroke-width="1.5" opacity="0.4"/>

  <!-- Heavenly realm upper — cloud forms -->
  <ellipse cx="400" cy="130" rx="180" ry="60" fill="#1e1608" opacity="0.7"/>
  <ellipse cx="280" cy="150" rx="100" ry="40" fill="#1a1308" opacity="0.5"/>
  <ellipse cx="520" cy="145" rx="110" ry="38" fill="#1a1308" opacity="0.5"/>

  <!-- Dove / Holy Spirit symbol at apex -->
  <ellipse cx="400" cy="115" rx="18" ry="8" fill="#c9aa5d" opacity="0.9"/>
  <path d="M388,115 Q400,100 412,115" fill="#c9aa5d" opacity="0.7"/>
  <!-- Rays from dove -->
  <line x1="400" y1="107" x2="400" y2="75" stroke="#c9aa5d" stroke-width="1.5" opacity="0.5"/>
  <line x1="392" y1="110" x2="370" y2="85" stroke="#c9aa5d" stroke-width="1" opacity="0.4"/>
  <line x1="408" y1="110" x2="430" y2="85" stroke="#c9aa5d" stroke-width="1" opacity="0.4"/>
  <line x1="386" y1="113" x2="355" y2="95" stroke="#c9aa5d" stroke-width="0.8" opacity="0.3"/>
  <line x1="414" y1="113" x2="445" y2="95" stroke="#c9aa5d" stroke-width="0.8" opacity="0.3"/>

  <!-- Heavenly figures (upper tier) — stylized seated saints -->
  <!-- Central enthroned Christ figure -->
  <ellipse cx="400" cy="168" rx="14" ry="14" fill="#c9aa5d" opacity="0.5"/>
  <rect x="390" y="180" width="20" height="35" rx="3" fill="#8a6020" opacity="0.6"/>
  <path d="M382,215 Q400,225 418,215" fill="#6a4818" opacity="0.5"/>

  <!-- Left heavenly figure -->
  <ellipse cx="320" cy="172" rx="10" ry="10" fill="#c9aa5d" opacity="0.4"/>
  <rect x="313" y="181" width="14" height="28" rx="2" fill="#6a5020" opacity="0.5"/>

  <!-- Right heavenly figure -->
  <ellipse cx="480" cy="172" rx="10" ry="10" fill="#c9aa5d" opacity="0.4"/>
  <rect x="473" y="181" width="14" height="28" rx="2" fill="#6a5020" opacity="0.5"/>

  <!-- More upper-tier figures -->
  <ellipse cx="250" cy="178" rx="9" ry="9" fill="#c9aa5d" opacity="0.3"/>
  <rect x="244" y="186" width="12" height="24" rx="2" fill="#5a4418" opacity="0.4"/>
  <ellipse cx="550" cy="178" rx="9" ry="9" fill="#c9aa5d" opacity="0.3"/>
  <rect x="544" y="186" width="12" height="24" rx="2" fill="#5a4418" opacity="0.4"/>

  <!-- Monstrance / Blessed Sacrament on altar (center ground level) -->
  <rect x="385" y="340" width="30" height="60" rx="2" fill="#6a5020" opacity="0.7"/>
  <circle cx="400" cy="320" r="28" fill="none" stroke="#c9aa5d" stroke-width="2.5" opacity="0.8"/>
  <circle cx="400" cy="320" r="20" fill="#2a1e0a" stroke="#c9aa5d" stroke-width="1.5" opacity="0.8"/>
  <circle cx="400" cy="320" r="10" fill="#c9aa5d" opacity="0.6"/>
  <!-- Monstrance rays -->
  <g stroke="#c9aa5d" stroke-width="1.2" opacity="0.6">
    <line x1="400" y1="292" x2="400" y2="278"/>
    <line x1="400" y1="348" x2="400" y2="362"/>
    <line x1="372" y1="320" x2="358" y2="320"/>
    <line x1="428" y1="320" x2="442" y2="320"/>
    <line x1="380" y1="300" x2="370" y2="290"/>
    <line x1="420" y1="300" x2="430" y2="290"/>
    <line x1="380" y1="340" x2="370" y2="350"/>
    <line x1="420" y1="340" x2="430" y2="350"/>
  </g>

  <!-- Altar cloth -->
  <rect x="320" y="398" width="160" height="12" rx="1" fill="#3a2a10" opacity="0.8"/>
  <rect x="315" y="408" width="170" height="6" rx="1" fill="#2a1e08" opacity="0.6"/>
  <!-- Altar cross decoration -->
  <line x1="400" y1="400" x2="400" y2="407" stroke="#c9aa5d" stroke-width="1" opacity="0.5"/>
  <line x1="396" y1="403" x2="404" y2="403" stroke="#c9aa5d" stroke-width="1" opacity="0.5"/>

  <!-- Ground level disputants — left group -->
  <!-- Figure 1 far left standing, gesturing -->
  <ellipse cx="155" cy="340" rx="11" ry="11" fill="#c9aa5d" opacity="0.45"/>
  <path d="M148,350 L148,410 L162,410 L162,350 Z" rx="3" fill="#4a3818" opacity="0.6"/>
  <path d="M148,375 L130,365" stroke="#5a4020" stroke-width="3" opacity="0.5"/>
  <!-- Figure 2 -->
  <ellipse cx="200" cy="338" rx="11" ry="11" fill="#c9aa5d" opacity="0.4"/>
  <path d="M193,348 L193,415 L207,415 L207,348 Z" fill="#3a2c12" opacity="0.6"/>
  <!-- Figure 3 (kneeling) -->
  <ellipse cx="255" cy="355" rx="10" ry="10" fill="#c9aa5d" opacity="0.4"/>
  <path d="M248,364 L248,400 L262,400 L262,364 Z" fill="#5a4020" opacity="0.55"/>
  <!-- Open book in hands -->
  <rect x="240" y="385" width="25" height="16" rx="1" fill="#e8d5a0" opacity="0.5"/>
  <line x1="252" y1="385" x2="252" y2="401" stroke="#8a7040" stroke-width="0.8" opacity="0.6"/>

  <!-- Ground level disputants — right group -->
  <!-- Figure 4 -->
  <ellipse cx="545" cy="338" rx="11" ry="11" fill="#c9aa5d" opacity="0.4"/>
  <path d="M538,348 L538,415 L552,415 L552,348 Z" fill="#3a2c12" opacity="0.6"/>
  <!-- Book in hands -->
  <rect x="530" y="378" width="24" height="16" rx="1" fill="#e8d5a0" opacity="0.5"/>
  <line x1="542" y1="378" x2="542" y2="394" stroke="#8a7040" stroke-width="0.8" opacity="0.6"/>
  <!-- Figure 5 gesturing -->
  <ellipse cx="600" cy="340" rx="11" ry="11" fill="#c9aa5d" opacity="0.45"/>
  <path d="M593,350 L593,412 L607,412 L607,350 Z" fill="#4a3818" opacity="0.6"/>
  <path d="M607,370 L625,360" stroke="#5a4020" stroke-width="3" opacity="0.5"/>
  <!-- Figure 6 far right -->
  <ellipse cx="645" cy="338" rx="10" ry="10" fill="#c9aa5d" opacity="0.4"/>
  <path d="M638,348 L638,415 L652,415 L652,348 Z" fill="#3a2c12" opacity="0.55"/>

  <!-- Steps / Podium -->
  <rect x="200" y="418" width="400" height="8" rx="1" fill="#2a2010" opacity="0.7"/>
  <rect x="170" y="425" width="460" height="8" rx="1" fill="#221a0c" opacity="0.6"/>
  <rect x="140" y="432" width="520" height="8" rx="1" fill="#1a1408" opacity="0.5"/>

  <!-- Floor -->
  <rect x="0" y="440" width="800" height="60" fill="#120f06" opacity="0.9"/>

  <!-- Geometric floor pattern -->
  <line x1="100" y1="480" x2="700" y2="455" stroke="#2a2010" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="470" x2="700" y2="445" stroke="#2a2010" stroke-width="1" opacity="0.3"/>

  <!-- Grain overlay -->
  <rect width="800" height="500" fill="#0a0805" opacity="0.25" filter="url(#grain)"/>

  <!-- Border frame -->
  <rect x="8" y="8" width="784" height="484" fill="none" stroke="#5a4020" stroke-width="2" opacity="0.6"/>
  <rect x="14" y="14" width="772" height="472" fill="none" stroke="#3a2810" stroke-width="1" opacity="0.4"/>

  <!-- Corner ornaments -->
  <text x="20" y="36" font-size="18" fill="#8a6030" opacity="0.7" font-family="serif">✠</text>
  <text x="762" y="36" font-size="18" fill="#8a6030" opacity="0.7" font-family="serif">✠</text>
  <text x="20" y="490" font-size="18" fill="#8a6030" opacity="0.7" font-family="serif">✠</text>
  <text x="762" y="490" font-size="18" fill="#8a6030" opacity="0.7" font-family="serif">✠</text>

  <!-- Caption text at bottom -->
  <rect x="0" y="455" width="800" height="45" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="478" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#c9aa5d" letter-spacing="3" opacity="0.9">DISPUTATIO DE EUCHARISTIA · POST RAPHAEL SANZIO · c. MDX</text>
</svg>
